<!-- ================= AUTH LAYOUT (LOGIN ONLY) ================= -->
<ng-container *ngIf="!isLoginPage; else loginOnly">

  <div class="app-layout">

    <!-- Mobile overlay -->
    <div class="sidebar-overlay" [class.active]="sidebarOpen" (click)="closeSidebar()"></div>

    <!-- ================= SIDEBAR ================= -->
    <div class="sidebar" [class.open]="sidebarOpen">

      <!-- Logo -->
      <div class="sidebar-logo">
        <mat-icon class="logo-icon">receipt_long</mat-icon>
        <span class="logo-text">QuoteApp</span>
      </div>

      <nav class="sidebar-nav">

        <!-- CUSTOMER MENU -->
        <div class="menu-group">
          <button
            type="button"
            class="nav-item"
            (click)="toggleUserMenu()"
            [class.active]="userMenuOpen">
            <mat-icon class="nav-icon">person</mat-icon>
            <span class="nav-text">Customer</span>
            <mat-icon class="nav-arrow" [class.rotate]="userMenuOpen">chevron_right</mat-icon>
          </button>

          <div class="submenu" [class.open]="userMenuOpen">
            <a class="submenu-item" routerLink="/customers" routerLinkActive="submenu-active" (click)="closeSidebar()">
              Customer List
            </a>
            <a class="submenu-item" routerLink="/customers/add" routerLinkActive="submenu-active" (click)="closeSidebar()">
              New Customer
            </a>
          </div>
        </div>

        <!-- QUOTE MENU -->
        <div class="menu-group">
          <button
            type="button"
            class="nav-item"
            (click)="toggleQuoteMenu()"
            [class.active]="quoteMenuOpen">
            <mat-icon class="nav-icon">description</mat-icon>
            <span class="nav-text">Quote</span>
            <mat-icon class="nav-arrow" [class.rotate]="quoteMenuOpen">chevron_right</mat-icon>
          </button>

          <div class="submenu" [class.open]="quoteMenuOpen">
            <a class="submenu-item" routerLink="/quotes" routerLinkActive="submenu-active" (click)="closeSidebar()">
              Quote List
            </a>
            <a class="submenu-item" routerLink="/quotes/add" routerLinkActive="submenu-active" (click)="closeSidebar()">
              New Quote
            </a>
          </div>
        </div>

      </nav>

      <!-- Logout at bottom -->
      <div class="sidebar-footer">
        <button type="button" class="logout-btn" (click)="logout()">
          <mat-icon class="nav-icon">logout</mat-icon>
          <span class="nav-text">Logout</span>
        </button>
      </div>

    </div>

    <!-- ================= MAIN AREA ================= -->
    <div class="main-area">

      <!-- Top Bar -->
      <div class="topbar">
        <div class="topbar-left">
          <button class="hamburger" (click)="toggleSidebar()">
            <mat-icon>menu</mat-icon>
          </button>
          <span class="topbar-title">QuoteApp</span>
        </div>
        <div class="topbar-actions">
          <button mat-icon-button>
            <mat-icon>search</mat-icon>
          </button>
          <button mat-icon-button>
            <mat-icon>notifications</mat-icon>
          </button>
          <button mat-icon-button [matMenuTriggerFor]="accountMenu">
            <mat-icon>account_circle</mat-icon>
          </button>
          <mat-menu #accountMenu="matMenu">
            <button mat-menu-item (click)="logout()">
              <mat-icon>logout</mat-icon>
              <span>Logout</span>
            </button>
          </mat-menu>
        </div>
      </div>

      <!-- Content -->
      <div class="content-area">
        <router-outlet></router-outlet>
      </div>

    </div>

  </div>

</ng-container>

<!-- ================= LOGIN ONLY VIEW ================= -->
<ng-template #loginOnly>
  <router-outlet></router-outlet>
</ng-template>
