<div class="login-page">

  <!-- LEFT PANEL -->
  <div class="login-left">
    <div class="login-box">

      <!-- Logo -->
      <div class="logo">
        <mat-icon class="logo-icon">receipt_long</mat-icon>
        <span class="logo-text">QuoteApp</span>
      </div>

      <h1 class="login-title">Sign in</h1>
      <p class="login-sub">to access QuoteApp</p>

      <form [formGroup]="form" (ngSubmit)="login()">

        <div class="field-group">
          <input
            class="field-input"
            type="text"
            formControlName="email"
            placeholder="Username">
        </div>

        <div class="field-group">
          <input
            class="field-input"
            type="password"
            formControlName="password"
            placeholder="Password">
        </div>

        <p class="error" *ngIf="error">{{ error }}</p>

        <button type="submit" class="next-btn">Next</button>

      </form>

      <p class="copyright">© 2014-2026 QuoteApp</p>

    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="login-right">
    <div class="right-content">
      <div class="right-icon">
        <mat-icon>description</mat-icon>
      </div>
      <h2>Manage your quotes</h2>
      <p>Create, track and manage customer quotes all in one place.</p>
    </div>
  </div>

</div>
