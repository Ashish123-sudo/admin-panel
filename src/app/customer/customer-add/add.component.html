<div class="page-container">

  <!-- Header -->
  <div class="page-header">
    <h1 class="page-title">New Customer</h1>
  </div>

  <!-- Form -->
  <form [formGroup]="customerForm" (ngSubmit)="onSubmit()" class="customer-form">

    <!-- Company Name -->
    <div class="form-row">
      <label class="form-label">Company Name <span class="required">*</span></label>
      <div class="input-wrapper">
        <input type="text" class="form-input" formControlName="name" placeholder="Company Name">
      </div>
    </div>

    <!-- Company Phone Number -->
    <div class="form-row">
      <label class="form-label">Company Phone Number</label>
      <div class="input-wrapper">
        <input type="tel" class="form-input" formControlName="contactNumber" placeholder="Company Phone Number">
      </div>
    </div>

    <!-- Company Email -->
    <div class="form-row">
      <label class="form-label">Company Email</label>
      <div class="input-wrapper">
        <input type="email" class="form-input" formControlName="emailId" placeholder="Company Email">
      </div>
    </div>

    <!-- Address Line 1 -->
    <div class="form-row">
      <label class="form-label">Address Line 1</label>
      <div class="input-wrapper">
        <input type="text" class="form-input" formControlName="address1" placeholder="Address Line 1">
      </div>
    </div>

    <!-- Address Line 2 -->
    <div class="form-row">
      <label class="form-label">Address Line 2</label>
      <div class="input-wrapper">
        <input type="text" class="form-input" formControlName="address2" placeholder="Address Line 2">
      </div>
    </div>

    <!-- City -->
    <div class="form-row">
      <label class="form-label">City</label>
      <div class="input-wrapper">
        <input type="text" class="form-input" formControlName="city" placeholder="City">
      </div>
    </div>

    <!-- State / Province -->
    <div class="form-row">
      <label class="form-label">State / Province</label>
      <div class="input-wrapper">
        <input type="text" class="form-input" formControlName="stateProvince" placeholder="State / Province">
      </div>
    </div>

    <!-- Country -->
    <div class="form-row">
      <label class="form-label">Country</label>
      <div class="input-wrapper">
        <input type="text" class="form-input" formControlName="country" placeholder="Country">
      </div>
    </div>

    <!-- Website URL -->
    <div class="form-row">
      <label class="form-label">Company Website</label>
      <div class="input-wrapper">
        <input type="url" class="form-input" formControlName="webUrl" placeholder="Website URL">
      </div>
    </div>

    <!-- Actions -->
    <div class="form-actions">
      <button type="submit" class="btn btn-save" [disabled]="!customerForm.valid || isSubmitting">
        {{ isSubmitting ? 'Saving...' : 'Save' }}
      </button>
      <button type="button" class="btn btn-cancel" (click)="onCancel()" [disabled]="isSubmitting">
        Cancel
      </button>
    </div>

  </form>
</div>
