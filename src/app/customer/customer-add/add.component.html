<div class="page-container">

  <!-- Header -->
  <div class="page-header">
    <h1 class="page-title">New Customer</h1>
  </div>

  <!-- Form -->
  <form [formGroup]="customerForm" (ngSubmit)="onSubmit()" class="customer-form">

    <!-- First Name -->
    <div class="form-row">
      <label class="form-label">First Name <span class="required">*</span></label>
      <div class="input-wrapper">
        <input type="text" class="form-input" formControlName="name" placeholder="First Name">
      </div>
    </div>

    <!-- Last Name -->
    <div class="form-row">
      <label class="form-label">Last Name</label>
      <div class="input-wrapper">
        <input type="text" class="form-input" formControlName="address1" placeholder="Last Name">
      </div>
    </div>

    <!-- Phone Number -->
    <div class="form-row">
      <label class="form-label">Phone Number</label>
      <div class="input-wrapper">
        <input type="tel" class="form-input" formControlName="contactNumber" placeholder="Phone Number">
      </div>
    </div>

    <!-- Email -->
    <div class="form-row">
      <label class="form-label">E-Mail</label>
      <div class="input-wrapper">
        <input type="email" class="form-input" formControlName="emailId" placeholder="E-Mail">
      </div>
    </div>

    <!-- Address Line 1 -->
    <div class="form-row">
      <label class="form-label">Address Line 1</label>
      <div class="input-wrapper">
        <input type="text" class="form-input" formControlName="address2" placeholder="Address Line 1">
      </div>
    </div>

    <!-- Address Line 2 -->
    <div class="form-row">
      <label class="form-label">Address Line 2</label>
      <div class="input-wrapper">
        <input type="text" class="form-input" formControlName="city" placeholder="Address Line 2">
      </div>
    </div>

    <!-- City -->
    <div class="form-row">
      <label class="form-label">City</label>
      <div class="input-wrapper">
        <input type="text" class="form-input" formControlName="country" placeholder="City">
      </div>
    </div>

    <!-- Website URL -->
    <div class="form-row">
      <label class="form-label">Website URL</label>
      <div class="input-wrapper">
        <input type="url" class="form-input" formControlName="webUrl" placeholder="Website URL">
      </div>
    </div>

    <!-- Actions -->
    <div class="form-actions">
      <button type="submit" class="btn btn-save" [disabled]="!customerForm.valid || isSubmitting">
        {{ isSubmitting ? 'Saving...' : 'Save' }}
      </button>
      <button type="button" class="btn btn-cancel" (click)="onCancel()" [disabled]="isSubmitting">
        Cancel
      </button>
    </div>

  </form>
</div>
