<div class="page-container">

  <div class="page-header">
    <h2 class="page-title">Edit Customer</h2>
  </div>

  <form [formGroup]="customerForm" (ngSubmit)="onSubmit()" class="customer-form">

    <div class="section-title">CONTACT DETAILS</div>

    <div class="form-row">
      <label class="form-label">Name <span class="required">*</span></label>
      <div class="input-wrapper">
        <input type="text" class="form-input" formControlName="name" placeholder="Full Name">
      </div>
      <div class="field-error" *ngIf="customerForm.get('name')?.invalid && customerForm.get('name')?.touched">
        Name is required
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">Phone Number</label>
      <div class="input-wrapper">
        <input type="tel" class="form-input" formControlName="contactNumber" placeholder="Phone Number">
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">E-Mail</label>
      <div class="input-wrapper">
        <input type="email" class="form-input" formControlName="emailId" placeholder="E-Mail">
      </div>
      <div class="field-error" *ngIf="customerForm.get('emailId')?.invalid && customerForm.get('emailId')?.touched">
        Please enter a valid email
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">Website URL</label>
      <div class="input-wrapper">
        <input type="url" class="form-input" formControlName="webUrl" placeholder="Website URL">
      </div>
    </div>

    <div class="section-title">ADDRESS</div>

    <div class="form-row">
      <label class="form-label">Address Line 1</label>
      <div class="input-wrapper">
        <input type="text" class="form-input" formControlName="address1" placeholder="Address Line 1">
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">Address Line 2</label>
      <div class="input-wrapper">
        <input type="text" class="form-input" formControlName="address2" placeholder="Address Line 2">
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">City</label>
      <div class="input-wrapper">
        <input type="text" class="form-input" formControlName="city" placeholder="City">
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">State</label>
      <div class="input-wrapper">
        <input type="text" class="form-input" formControlName="stateProvince" placeholder="State">
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">Country</label>
      <div class="input-wrapper">
        <input type="text" class="form-input" formControlName="country" placeholder="Country">
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="new-btn" [disabled]="!customerForm.valid || isSubmitting">
        {{ isSubmitting ? 'Updating...' : 'Update' }}
      </button>
      <button type="button" class="cancel-btn" (click)="onCancel()" [disabled]="isSubmitting">
        Cancel
      </button>
    </div>

  </form>
</div>
