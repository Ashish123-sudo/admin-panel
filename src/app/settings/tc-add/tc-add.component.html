<div class="page-container">

  <div class="page-header">
    <h1 class="page-title">New Terms & Conditions Template</h1>
  </div>

  <form [formGroup]="tcForm" (ngSubmit)="onSubmit()" class="tc-form">

    <!-- Template Name -->
    <div class="form-row">
      <label class="form-label">Template Name <span class="required">*</span></label>
      <div class="input-wrapper">
        <input type="text" class="form-input" formControlName="templateName" placeholder="Template Name">
      </div>
    </div>

    <!-- Term Groups -->
    <div class="form-row form-row--terms">
      <label class="form-label">Terms <span class="required">*</span></label>
      <div class="input-wrapper">

        <!-- Existing groups -->
        <div class="terms-box" *ngFor="let group of groups; let gi = index">
          <div class="terms-box-header">
            <span class="group-name">{{ group.groupName }}</span>
            <button type="button" class="btn-delete-group" (click)="removeGroup(gi)" title="Remove group">
              <mat-icon>delete</mat-icon>
            </button>
          </div>

          <div class="terms-box-subheader">
            <span class="col-num">#</span>
            <span class="col-term">TERM / CONDITION</span>
            <span class="col-action"></span>
          </div>

          <div class="terms-box-row" *ngFor="let detail of group.termsDetails; let di = index">
            <span class="col-num">{{ di + 1 }}</span>
            <span class="col-term">{{ detail.termText }}</span>
            <span class="col-action">
              <button type="button" class="btn-delete" (click)="removeTerm(gi, di)" title="Remove">
                <mat-icon>delete</mat-icon>
              </button>
            </span>
          </div>

          <!-- Add term to this group -->
          <div class="terms-box-input">
            <textarea
              class="term-input"
              [(ngModel)]="group['currentTerm']"
              [ngModelOptions]="{standalone: true}"
              placeholder="Enter a term or condition..."
              rows="2">
            </textarea>
          </div>
          <div class="terms-box-footer">
            <button type="button" class="btn-add-term" (click)="addTerm(gi)" [disabled]="!group['currentTerm']?.trim()">
              + Add Term
            </button>
          </div>
        </div>

        <!-- New group input -->
        <div class="new-group-box">
          <input
            type="text"
            class="form-input group-input"
            [(ngModel)]="currentGroupName"
            [ngModelOptions]="{standalone: true}"
            placeholder="Enter term type (e.g. Hardware Terms)">
          <button type="button" class="btn-add-term" (click)="addGroup()" [disabled]="!currentGroupName.trim()">
            + Add Term Type
          </button>
        </div>

      </div>
    </div>

    <!-- Actions -->
    <div class="form-actions">
      <button type="submit" class="btn btn-save" [disabled]="!tcForm.valid || isSubmitting">
        {{ isSubmitting ? 'Saving...' : 'Save' }}
      </button>
      <button type="button" class="btn btn-cancel" (click)="onCancel()" [disabled]="isSubmitting">
        Cancel
      </button>
    </div>

  </form>
</div>
