<div class="terms-settings-page">
  <div class="page-header">
    <h1 class="page-title">Terms &amp; Conditions</h1>
    <button class="btn-add" (click)="onAdd()">+</button>
  </div>

  <div class="table-container">
    <div class="loading" *ngIf="isLoading">Loading...</div>
    <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <table class="terms-table" *ngIf="!isLoading && !errorMessage">
      <thead>
        <tr>
          <th>TEMPLATE</th>
          <th>TERMS & CONDITIONS</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of termsList">
          <td class="template-cell">{{ item.templateName }}</td>
          <td class="terms-cell">
            <div *ngFor="let group of item.termsGroups" class="group-block">
              <div class="group-title">{{ group.groupName }}</div>
              <div *ngFor="let detail of group.termsDetails; let i = index" class="term-line">
                {{ i + 1 }}. {{ detail.termText }}
              </div>
            </div>
          </td>
          <td class="actions-cell">
            <button class="btn-icon btn-edit" (click)="onEdit(item)" title="Edit">
              <mat-icon>edit</mat-icon>
            </button>
            <button class="btn-icon btn-delete" (click)="onDelete(item)" title="Delete">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </tr>
        <tr *ngIf="termsList.length === 0">
          <td colspan="3" class="empty-cell">No terms &amp; conditions templates found.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
